server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

spring:
  application:
    name: cms-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cms}
    username: ${SPRING_DATASOURCE_USERNAME:cms}
    password: ${SPRING_DATASOURCE_PASSWORD:cms}
    hikari:
      initialization-fail-timeout: -1
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:false}
    locations: ${SPRING_FLYWAY_LOCATIONS:filesystem:../infra/db/migrations}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

cms:
  cors:
    allowed-origins: ${CMS_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8080}
  attachments:
    max-single-file-bytes: 10485760
    max-request-bytes: 20971520

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%level thread=%thread logger=%logger{36} requestId=%X{requestId:-} msg=%msg%n"
  level:
    com.company.cms: ${CMS_LOG_LEVEL:INFO}
