openapi: 3.1.0
info:
  title: CMS Internal Knowledge, Documents, and Notices API
  version: 0.1.0
paths:
  /api/v1/me:
    get:
      responses:
        "200":
          description: Current user profile
  /api/v1/portal/home:
    get:
      responses:
        "200":
          description: Portal home content sections
  /api/v1/content:
    get:
      responses:
        "200":
          description: Paged content results
    post:
      responses:
        "201":
          description: Draft content created
  /api/v1/content/{contentId}/submit-review:
    post:
      responses:
        "200":
          description: Content moved to review
  /api/v1/content/{contentId}/review:
    post:
      responses:
        "200":
          description: Review decision applied
  /api/v1/content/{contentId}/publish:
    post:
      responses:
        "200":
          description: Content published or scheduled
  /api/v1/content/{contentId}/acknowledgements:
    post:
      responses:
        "201":
          description: Acknowledgement recorded
  /api/v1/notices/pending:
    get:
      responses:
        "200":
          description: Pending notices
  /api/v1/notices/{noticeId}/acknowledgements:
    post:
      responses:
        "201":
          description: Notice acknowledgement recorded
  /api/v1/notices/{noticeId}/acknowledgements/report:
    get:
      responses:
        "200":
          description: Notice acknowledgement report
  /api/v1/bookmarks:
    get:
      responses:
        "200":
          description: User bookmarks
    post:
      responses:
        "201":
          description: Bookmark created
  /api/v1/bookmarks/{contentId}:
    delete:
      responses:
        "204":
          description: Bookmark removed
  /api/v1/audit-events:
    get:
      responses:
        "200":
          description: Audit search results
  /api/v1/reports/content-health:
    get:
      responses:
        "200":
          description: Content health report
