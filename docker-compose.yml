services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PORT: "3000"
      HOST: 0.0.0.0
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "3000:3000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api
