services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cms
      POSTGRES_USER: cms
      POSTGRES_PASSWORD: cms
    volumes:
      - cms_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cms -d cms"]
      interval: 10s
      timeout: 5s
      retries: 5

  file-storage:
    image: alpine:3.20
    command: ["sh", "-c", "mkdir -p /data/uploads && tail -f /dev/null"]
    volumes:
      - cms_file_data:/data/uploads

  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/cms
      SPRING_DATASOURCE_USERNAME: cms
      SPRING_DATASOURCE_PASSWORD: cms
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_LOCATIONS: filesystem:/app/infra/db/migrations
      CMS_CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      file-storage:
        condition: service_started

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  cms_db_data:
  cms_file_data:
